<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Categorias')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Categorias', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <div class="btn-grupo" style="justify-content:space-between;align-items:center;">
        <h2>CATEGORIAS</h2>
        <a class="btn btn-primario" th:href="@{/categorias/novo}" sec:authorize="hasRole('ADMIN')">NOVA CATEGORIA</a>
      </div>

      <div class="tabela-wrapper">
        <table class="tabela">
          <thead><tr><th>NOME</th><th>DESCRIÇÃO</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(categorias)}"><td colspan="4">Nenhuma categoria cadastrada.</td></tr>
          <tr th:each="item : ${categorias}">
            <td th:text="${item.nome}"></td>
            <td th:text="${item.descricao}"></td>
            <td><span class="tag" th:classappend="${!item.ativo} ? 'tag-inativo'" th:text="${item.ativo} ? 'ATIVO' : 'INATIVO'"></span></td>
            <td>
              <div class="btn-grupo">
                <a class="btn btn-secundario" th:href="@{/categorias/{id}(id=${item.id})}">VER</a>
                <a class="btn btn-sucesso" th:href="@{/categorias/{id}/editar(id=${item.id})}" sec:authorize="hasRole('ADMIN')">EDITAR</a>
                <form th:action="@{/categorias/{id}/desativar(id=${item.id})}" method="post" th:if="${item.ativo}" sec:authorize="hasRole('ADMIN')">
                  <button class="btn btn-alerta" type="submit">DESATIVAR</button>
                </form>
                <form th:action="@{/categorias/{id}/excluir(id=${item.id})}" method="post" sec:authorize="hasRole('ADMIN')">
                  <button class="btn btn-danger" type="submit">EXCLUIR</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
</body>
</html>
