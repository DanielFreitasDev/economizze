<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Formulario de Categoria')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Categorias', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2 th:text="${acao == 'criar'} ? 'NOVA CATEGORIA' : 'EDITAR CATEGORIA'"></h2>
      <form class="grid" th:object="${categoriaForm}" th:action="${acao == 'criar'} ? @{/categorias} : @{/categorias/{id}(id=${categoria.id})}" method="post">
        <div>
          <label for="nome">NOME *</label>
          <input id="nome" th:field="*{nome}" class="uppercase-input" required>
          <small class="texto-muted" th:errors="*{nome}"></small>
        </div>
        <div>
          <label for="descricao">DESCRICAO</label>
          <textarea id="descricao" th:field="*{descricao}" class="uppercase-input"></textarea>
          <small class="texto-muted" th:errors="*{descricao}"></small>
        </div>
        <div class="btn-grupo">
          <button class="btn btn-primario" type="submit">SALVAR</button>
          <a class="btn btn-secundario" th:href="@{/categorias}">VOLTAR</a>
        </div>
      </form>
    </section>
  </div>
</div>
</body>
</html>
