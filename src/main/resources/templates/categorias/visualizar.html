<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Visualizar Categoria')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Categorias', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2>DETALHES DA CATEGORIA</h2>
      <div class="grid grid-2">
        <div><label>NOME</label><div th:text="${categoria.nome}"></div></div>
        <div><label>STATUS</label><div th:text="${categoria.ativo} ? 'ATIVO' : 'INATIVO'"></div></div>
        <div><label>DESCRIÇÃO</label><div th:text="${categoria.descricao}"></div></div>
      </div>
      <div class="btn-grupo" style="margin-top:1rem;">
        <a class="btn btn-sucesso" th:href="@{/categorias/{id}/editar(id=${categoria.id})}" sec:authorize="hasRole('ADMIN')">EDITAR</a>
        <a class="btn btn-secundario" th:href="@{/categorias}">VOLTAR</a>
      </div>
    </section>
  </div>
</div>
</body>
</html>
