<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Formulário de Lançamento')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Lançamentos', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2 th:text="${acao == 'criar'} ? 'NOVO LANÇAMENTO' : 'EDITAR LANÇAMENTO'"></h2>
      <form class="grid" th:object="${lancamentoForm}" th:action="${acao == 'criar'} ? @{/lancamentos} : @{/lancamentos/{id}(id=${lancamento.id})}" method="post">
        <div class="grid grid-2">
          <div>
            <label for="nome">NOME *</label>
            <input id="nome" th:field="*{nome}" class="uppercase-input" required>
          </div>
          <div>
            <label for="valor">VALOR *</label>
            <input id="valor" th:field="*{valor}" class="moeda-input" required>
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="natureza">NATUREZA *</label>
            <select id="natureza" th:field="*{natureza}" required>
              <option value="">SELECIONE</option>
              <option th:each="natureza : ${naturezas}" th:value="${natureza}" th:text="${natureza}"></option>
            </select>
          </div>
          <div>
            <label for="tipo">TIPO *</label>
            <select id="tipo" th:field="*{tipo}" required>
              <option value="">SELECIONE</option>
              <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
            </select>
          </div>
          <div>
            <label for="categoriaId">CATEGORIA *</label>
            <select id="categoriaId" th:field="*{categoriaId}" required>
              <option value="">SELECIONE</option>
              <option th:each="categoria : ${categorias}" th:value="${categoria.id}" th:text="${categoria.nome}"></option>
            </select>
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="contaId">CONTA (ESCOLHER CONTA OU CARTÃO)</label>
            <select id="contaId" th:field="*{contaId}">
              <option value="">SELECIONE</option>
              <option th:each="conta : ${contas}" th:value="${conta.id}" th:text="${conta.nome}"></option>
            </select>
          </div>
          <div>
            <label for="cartaoId">CARTÃO (ESCOLHER CONTA OU CARTÃO)</label>
            <select id="cartaoId" th:field="*{cartaoId}">
              <option value="">SELECIONE</option>
              <option th:each="cartao : ${cartoes}" th:value="${cartao.id}" th:text="${cartao.banco + ' **** ' + #strings.substring(cartao.numeroCartao, cartao.numeroCartao.length() - 4, cartao.numeroCartao.length())}"></option>
            </select>
          </div>
          <div>
            <label for="competenciaFaturaInicial">COMPETÊNCIA FATURA (CARTÃO)</label>
            <select id="competenciaFaturaInicial" th:field="*{competenciaFaturaInicial}">
              <option value="">SELECIONE</option>
              <option th:if="*{competenciaFaturaInicial != null}"
                      th:value="*{competenciaFaturaInicial}"
                      th:text="${#temporals.format(lancamentoForm.competenciaFaturaInicial, 'yyyy-MM')}"></option>
            </select>
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="dataBase">DATA BASE *</label>
            <input id="dataBase" th:field="*{dataBase}" type="date" required>
          </div>
          <div>
            <label for="totalParcelas">TOTAL PARCELAS (PARCELADO)</label>
            <input id="totalParcelas" th:field="*{totalParcelas}" type="number" min="2">
          </div>
          <div>
            <label for="dataFimRecorrencia">DATA FIM (RECORRENTE)</label>
            <input id="dataFimRecorrencia" th:field="*{dataFimRecorrencia}" type="date">
          </div>
        </div>

        <div>
          <label for="observacao">OBSERVAÇÃO</label>
          <textarea id="observacao" th:field="*{observacao}" class="uppercase-input"></textarea>
        </div>

        <div class="btn-grupo">
          <button class="btn btn-primario" type="submit">SALVAR</button>
          <a class="btn btn-secundario" th:href="@{/lancamentos}">VOLTAR</a>
        </div>
      </form>
    </section>
  </div>
</div>
</body>
</html>
