<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Pagamentos')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Pagamentos', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <div class="btn-grupo" style="justify-content:space-between;align-items:center;">
        <h2>PAGAMENTOS E ENCARGOS</h2>
        <a class="btn btn-primario" th:href="@{/pagamentos/novo}" sec:authorize="hasRole('ADMIN')">NOVO MOVIMENTO</a>
      </div>
      <div class="tabela-wrapper">
        <table class="tabela">
          <thead><tr><th>DATA</th><th>PESSOA</th><th>CARTÃO</th><th>DESCRIÇÃO</th><th>TIPO</th><th>VALOR</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(pagamentos)}"><td colspan="8">Nenhum movimento cadastrado.</td></tr>
          <tr th:each="item : ${pagamentos}">
            <td th:text="${#temporals.format(item.dataPagamento, 'dd/MM/yyyy')}"></td>
            <td th:text="${item.pessoa.nome}"></td>
            <td th:text="${item.cartao.banco + ' **** ' + #strings.substring(item.cartao.numeroCartao, item.cartao.numeroCartao.length() - 4, item.cartao.numeroCartao.length())}"></td>
            <td th:text="${item.descricao}"></td>
            <td th:text="${item.tipo}"></td>
            <td class="valor" th:text="${@formatador.moeda(item.valor)}"></td>
            <td><span class="tag" th:classappend="${!item.ativo} ? 'tag-inativo'" th:text="${item.ativo} ? 'ATIVO' : 'INATIVO'"></span></td>
            <td>
              <div class="btn-grupo">
                <a class="btn btn-secundario" th:href="@{/pagamentos/{id}(id=${item.id})}">VER</a>
                <a class="btn btn-sucesso" th:href="@{/pagamentos/{id}/editar(id=${item.id})}" sec:authorize="hasRole('ADMIN')">EDITAR</a>
                <form th:action="@{/pagamentos/{id}/desativar(id=${item.id})}" method="post" th:if="${item.ativo}" sec:authorize="hasRole('ADMIN')">
                  <button class="btn btn-alerta" type="submit">DESATIVAR</button>
                </form>
                <form th:action="@{/pagamentos/{id}/excluir(id=${item.id})}" method="post" sec:authorize="hasRole('ADMIN')">
                  <button class="btn btn-danger" type="submit">EXCLUIR</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
</body>
</html>
