<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Visualizar Pagamento')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Pagamentos', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2>DETALHES DO MOVIMENTO</h2>
      <div class="grid grid-2">
        <div><label>PESSOA</label><div th:text="${pagamento.pessoa.nome}"></div></div>
        <div><label>CARTÃO</label><div th:text="${pagamento.cartao.banco + ' **** ' + #strings.substring(pagamento.cartao.numeroCartao, pagamento.cartao.numeroCartao.length() - 4, pagamento.cartao.numeroCartao.length())}"></div></div>
        <div><label>DESCRIÇÃO</label><div th:text="${pagamento.descricao}"></div></div>
        <div><label>TIPO</label><div th:text="${pagamento.tipo}"></div></div>
        <div><label>VALOR</label><div th:text="${@formatador.moeda(pagamento.valor)}"></div></div>
        <div><label>DATA</label><div th:text="${#temporals.format(pagamento.dataPagamento, 'dd/MM/yyyy')}"></div></div>
      </div>
      <div class="btn-grupo" style="margin-top:1rem;">
        <a class="btn btn-sucesso" th:href="@{/pagamentos/{id}/editar(id=${pagamento.id})}" sec:authorize="hasRole('ADMIN')">EDITAR</a>
        <a class="btn btn-secundario" th:href="@{/pagamentos}">VOLTAR</a>
      </div>
    </section>
  </div>
</div>
</body>
</html>
