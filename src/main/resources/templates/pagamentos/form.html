<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Formulário de Pagamento')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Pagamentos', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2 th:text="${acao == 'criar'} ? 'NOVO MOVIMENTO' : 'EDITAR MOVIMENTO'"></h2>
      <form class="grid" th:object="${pagamentoPessoaForm}" th:action="${acao == 'criar'} ? @{/pagamentos} : @{/pagamentos/{id}(id=${pagamento.id})}" method="post">
        <div class="grid grid-3">
          <div>
            <label for="pessoaId">PESSOA *</label>
            <select id="pessoaId" th:field="*{pessoaId}" required>
              <option value="">SELECIONE</option>
              <option th:each="pessoa : ${pessoas}" th:value="${pessoa.id}" th:text="${pessoa.nome}"></option>
            </select>
          </div>
          <div>
            <label for="cartaoId">CARTÃO *</label>
            <select id="cartaoId" th:field="*{cartaoId}" required>
              <option value="">SELECIONE</option>
              <option th:each="cartao : ${cartoes}" th:value="${cartao.id}" th:text="${cartao.banco + ' **** ' + #strings.substring(cartao.numeroCartao, cartao.numeroCartao.length() - 4, cartao.numeroCartao.length())}"></option>
            </select>
          </div>
          <div>
            <label for="tipo">TIPO *</label>
            <select id="tipo" th:field="*{tipo}" required>
              <option value="">SELECIONE</option>
              <option th:each="tipo : ${tiposMovimento}" th:value="${tipo}" th:text="${tipo}"></option>
            </select>
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="descricao">DESCRIÇÃO *</label>
            <input id="descricao" th:field="*{descricao}" class="uppercase-input" required>
          </div>
          <div>
            <label for="valor">VALOR *</label>
            <input id="valor" th:field="*{valor}" class="moeda-input" required>
          </div>
          <div>
            <label for="dataPagamento">DATA *</label>
            <input id="dataPagamento" th:field="*{dataPagamento}" type="date" required>
          </div>
        </div>

        <div class="btn-grupo">
          <button class="btn btn-primario" type="submit">SALVAR</button>
          <a class="btn btn-secundario" th:href="@{/pagamentos}">VOLTAR</a>
        </div>
      </form>
    </section>
  </div>
</div>
</body>
</html>
