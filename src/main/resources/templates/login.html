<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Economizze</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" th:href="@{/favicon.ico}">
  <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg" th:href="@{/favicon.svg}">
  <link rel="shortcut icon" href="/favicon.ico" th:href="@{/favicon.ico}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <script>
    (function () {
      try {
        const chaveTema = "economizze-tema";
        const temaSalvo = localStorage.getItem(chaveTema);
        const temaValido = temaSalvo === "claro" || temaSalvo === "escuro";
        const prefereEscuro = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const temaInicial = temaValido ? temaSalvo : (prefereEscuro ? "escuro" : "claro");
        document.documentElement.setAttribute("data-tema", temaInicial);
      } catch (erro) {
        document.documentElement.setAttribute("data-tema", "claro");
      }
    })();
  </script>
</head>
<body>
<div class="login-wrapper">
  <button class="btn-tema-login" type="button" data-acao="alternar-tema" aria-pressed="false">
    <i class="fa-solid fa-sun" aria-hidden="true"></i>
    <span>TEMA: CLARO</span>
  </button>
  <div class="login-card">
    <h2>
      <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>
      <span>ACESSAR ECONOMIZZE</span>
    </h2>
    <p class="texto-muted">Controle financeiro completo, com foco em mobilidade.</p>

    <div class="alert alert-sucesso" th:if="${param.setupConcluido}">Primeiro administrador criado com sucesso.</div>
    <div class="alert alert-erro" th:if="${param.error}">Usuário ou senha inválidos.</div>
    <div class="alert alert-sucesso" th:if="${param.logout}">Sessão encerrada com sucesso.</div>

    <form th:action="@{/login}" method="post" class="grid">
      <div>
        <label for="username">USUÁRIO</label>
        <input id="username" name="username" class="uppercase-input" required>
      </div>
      <div>
        <label for="password">SENHA</label>
        <input id="password" name="password" type="password" required>
      </div>
      <button class="btn btn-primario" type="submit">
        <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>
        <span>ENTRAR</span>
      </button>
    </form>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
