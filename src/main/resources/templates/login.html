<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Economizze</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <script>
    (function () {
      try {
        const chaveTema = "economizze-tema";
        const temaSalvo = localStorage.getItem(chaveTema);
        const temaValido = temaSalvo === "claro" || temaSalvo === "escuro";
        const prefereEscuro = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const temaInicial = temaValido ? temaSalvo : (prefereEscuro ? "escuro" : "claro");
        document.documentElement.setAttribute("data-tema", temaInicial);
      } catch (erro) {
        document.documentElement.setAttribute("data-tema", "claro");
      }
    })();
  </script>
</head>
<body>
<div class="login-wrapper">
  <button class="btn-tema-login" type="button" data-acao="alternar-tema" aria-pressed="false">TEMA: CLARO</button>
  <div class="login-card">
    <h2>ACESSAR ECONOMIZZE</h2>
    <p class="texto-muted">Controle financeiro completo, com foco em mobilidade.</p>

    <div class="alert alert-sucesso" th:if="${param.setupConcluido}">Primeiro administrador criado com sucesso.</div>
    <div class="alert alert-erro" th:if="${param.error}">Usuário ou senha inválidos.</div>
    <div class="alert alert-sucesso" th:if="${param.logout}">Sessão encerrada com sucesso.</div>

    <form th:action="@{/login}" method="post" class="grid">
      <div>
        <label for="username">USUÁRIO</label>
        <input id="username" name="username" class="uppercase-input" required>
      </div>
      <div>
        <label for="password">SENHA</label>
        <input id="password" name="password" type="password" required>
      </div>
      <button class="btn btn-primario" type="submit">ENTRAR</button>
    </form>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
