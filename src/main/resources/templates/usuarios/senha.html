<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Alterar Senha')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Usuários', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2>ALTERAR SENHA</h2>
      <p class="texto-muted">Usuário: <strong th:text="${usuario.nomeCompleto}"></strong></p>

      <form class="grid" th:object="${alterarSenhaForm}" th:action="@{/usuarios/{id}/senha(id=${usuario.id})}" method="post">
        <div>
          <label for="novaSenha">NOVA SENHA</label>
          <input id="novaSenha" th:field="*{novaSenha}" type="password" required>
          <small class="texto-muted" th:errors="*{novaSenha}"></small>
        </div>
        <div>
          <label for="confirmarSenha">CONFIRMAR SENHA</label>
          <input id="confirmarSenha" th:field="*{confirmarSenha}" type="password" required>
          <small class="texto-muted" th:errors="*{confirmarSenha}"></small>
        </div>
        <div class="btn-grupo">
          <button class="btn btn-primario" type="submit">ALTERAR</button>
          <a class="btn btn-secundario" th:href="@{/usuarios}">VOLTAR</a>
        </div>
      </form>
    </section>
  </div>
</div>
</body>
</html>
