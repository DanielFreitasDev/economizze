<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Formulario de Transferencia')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Transferencias', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2 th:text="${acao == 'criar'} ? 'NOVA TRANSFERENCIA' : 'EDITAR TRANSFERENCIA'"></h2>
      <form class="grid" th:object="${transferenciaForm}" th:action="${acao == 'criar'} ? @{/transferencias} : @{/transferencias/{id}(id=${transferencia.id})}" method="post">
        <div>
          <label for="descricao">DESCRICAO *</label>
          <input id="descricao" th:field="*{descricao}" class="uppercase-input" required>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="contaOrigemId">CONTA ORIGEM *</label>
            <select id="contaOrigemId" th:field="*{contaOrigemId}" required>
              <option value="">SELECIONE</option>
              <option th:each="conta : ${contas}" th:value="${conta.id}" th:text="${conta.nome}"></option>
            </select>
          </div>
          <div>
            <label for="contaDestinoId">CONTA DESTINO *</label>
            <select id="contaDestinoId" th:field="*{contaDestinoId}" required>
              <option value="">SELECIONE</option>
              <option th:each="conta : ${contas}" th:value="${conta.id}" th:text="${conta.nome}"></option>
            </select>
          </div>
          <div>
            <label for="tipo">TIPO *</label>
            <select id="tipo" th:field="*{tipo}" required>
              <option value="">SELECIONE</option>
              <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
            </select>
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="valor">VALOR *</label>
            <input id="valor" th:field="*{valor}" class="moeda-input" required>
          </div>
          <div>
            <label for="dataBase">DATA BASE *</label>
            <input id="dataBase" th:field="*{dataBase}" type="date" required>
          </div>
          <div>
            <label for="totalParcelas">TOTAL PARCELAS</label>
            <input id="totalParcelas" th:field="*{totalParcelas}" type="number" min="2">
          </div>
        </div>

        <div class="grid grid-2">
          <div>
            <label for="dataFimRecorrencia">DATA FIM RECORRENCIA</label>
            <input id="dataFimRecorrencia" th:field="*{dataFimRecorrencia}" type="date">
          </div>
          <div>
            <label for="observacao">OBSERVACAO</label>
            <textarea id="observacao" th:field="*{observacao}" class="uppercase-input"></textarea>
          </div>
        </div>

        <div class="btn-grupo">
          <button class="btn btn-primario" type="submit">SALVAR</button>
          <a class="btn btn-secundario" th:href="@{/transferencias}">VOLTAR</a>
        </div>
      </form>
    </section>
  </div>
</div>
</body>
</html>
