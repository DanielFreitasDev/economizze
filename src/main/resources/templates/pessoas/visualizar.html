<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Visualizar Pessoa')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Pessoas', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2>DETALHES DA PESSOA</h2>
      <div class="grid grid-2">
        <div><label>NOME</label><div th:text="${pessoa.nome}"></div></div>
        <div><label>CPF</label><div th:text="${@formatador.maskCpf(pessoa.cpf)}"></div></div>
        <div><label>CELULAR</label><div th:text="${pessoa.telefoneCelular}"></div></div>
        <div><label>WHATSAPP</label><div th:text="${pessoa.whatsapp}"></div></div>
        <div><label>E-MAIL</label><div th:text="${pessoa.email}"></div></div>
        <div><label>CEP</label><div th:text="${pessoa.cep}"></div></div>
        <div><label>LOGRADOURO</label><div th:text="${pessoa.logradouro}"></div></div>
        <div><label>NÚMERO</label><div th:text="${pessoa.numero}"></div></div>
        <div><label>COMPLEMENTO</label><div th:text="${pessoa.complemento}"></div></div>
        <div><label>BAIRRO</label><div th:text="${pessoa.bairro}"></div></div>
        <div><label>CIDADE</label><div th:text="${pessoa.cidade}"></div></div>
        <div><label>ESTADO</label><div th:text="${pessoa.estado}"></div></div>
      </div>
      <div class="btn-grupo" style="margin-top:1rem;">
        <a class="btn btn-sucesso" th:href="@{/pessoas/{id}/editar(id=${pessoa.id})}" sec:authorize="hasRole('ADMIN')">EDITAR</a>
        <a class="btn btn-secundario" th:href="@{/pessoas}">VOLTAR</a>
      </div>
    </section>
  </div>
</div>
</body>
</html>
