<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Formulário de Pessoa')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Pessoas', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2 th:text="${acao == 'criar'} ? 'NOVA PESSOA' : 'EDITAR PESSOA'"></h2>
      <form class="grid" th:object="${pessoaForm}" th:action="${acao == 'criar'} ? @{/pessoas} : @{/pessoas/{id}(id=${pessoa.id})}" method="post">
        <div class="grid grid-2">
          <div>
            <label for="nome">NOME *</label>
            <input id="nome" th:field="*{nome}" class="uppercase-input" required>
            <small class="texto-muted" th:errors="*{nome}"></small>
          </div>
          <div>
            <label for="cpf">CPF *</label>
            <input id="cpf" th:field="*{cpf}" class="cpf-mask" required>
            <small class="texto-muted" th:errors="*{cpf}"></small>
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="cep">CEP</label>
            <input id="cep" th:field="*{cep}" class="cep-mask">
          </div>
          <div>
            <label for="logradouro">LOGRADOURO</label>
            <input id="logradouro" th:field="*{logradouro}" class="uppercase-input">
          </div>
          <div>
            <label for="numero">NÚMERO</label>
            <input id="numero" th:field="*{numero}" class="uppercase-input">
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="complemento">COMPLEMENTO</label>
            <input id="complemento" th:field="*{complemento}" class="uppercase-input">
          </div>
          <div>
            <label for="bairro">BAIRRO</label>
            <input id="bairro" th:field="*{bairro}" class="uppercase-input">
          </div>
          <div>
            <label for="cidade">CIDADE</label>
            <input id="cidade" th:field="*{cidade}" class="uppercase-input">
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="estado">ESTADO</label>
            <input id="estado" th:field="*{estado}" class="uppercase-input">
          </div>
          <div>
            <label for="pontoReferencia">PONTO DE REFERÊNCIA</label>
            <input id="pontoReferencia" th:field="*{pontoReferencia}" class="uppercase-input">
          </div>
          <div>
            <label for="email">E-MAIL</label>
            <input id="email" th:field="*{email}" type="email">
          </div>
        </div>

        <div class="grid grid-3">
          <div>
            <label for="telefoneCelular">CELULAR</label>
            <input id="telefoneCelular" th:field="*{telefoneCelular}" class="telefone-mask">
          </div>
          <div>
            <label for="whatsapp">WHATSAPP</label>
            <input id="whatsapp" th:field="*{whatsapp}" class="telefone-mask">
            <small><input id="copiarCelularWhatsapp" type="checkbox"> USAR O MESMO DO CELULAR</small>
          </div>
        </div>

        <div class="btn-grupo">
          <button class="btn btn-primario" type="submit">SALVAR</button>
          <a class="btn btn-secundario" th:href="@{/pessoas}">VOLTAR</a>
        </div>
      </form>
    </section>
  </div>
</div>
</body>
</html>
