<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${titulo} + ' | ' + ${nomeAplicacao}">Economizze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:fragment="pagina(titulo,conteudo)">
  <div class="layout">
    <header class="topbar">
      <div class="topbar-grid">
        <h1 th:text="${nomeAplicacao}">Economizze</h1>
        <small th:if="${usuarioLogado != null}">
          USUÁRIO: <span th:text="${usuarioLogado.nomeCompleto}"></span>
          | PERFIL: <span th:text="${usuarioLogado.perfil}"></span>
        </small>
      </div>
      <nav class="nav-mobile">
        <a th:href="@{/dashboard}" th:classappend="${caminhoAtual == '/dashboard'} ? 'ativo'">INÍCIO</a>
        <a th:href="@{/lancamentos}" th:classappend="${#strings.startsWith(caminhoAtual, '/lancamentos')} ? 'ativo'">LANÇAMENTOS</a>
        <a th:href="@{/cobrancas}" th:classappend="${#strings.startsWith(caminhoAtual, '/cobrancas')} ? 'ativo'">COBRANÇAS</a>
        <a th:href="@{/pessoas}" th:classappend="${#strings.startsWith(caminhoAtual, '/pessoas')} ? 'ativo'">PESSOAS</a>
        <a th:href="@{/cartoes}" th:classappend="${#strings.startsWith(caminhoAtual, '/cartoes')} ? 'ativo'">CARTÕES</a>
        <a th:href="@{/categorias}" th:classappend="${#strings.startsWith(caminhoAtual, '/categorias')} ? 'ativo'">CATEGORIAS</a>
        <a th:href="@{/contas}" th:classappend="${#strings.startsWith(caminhoAtual, '/contas')} ? 'ativo'">CONTAS</a>
        <a th:href="@{/transferencias}" th:classappend="${#strings.startsWith(caminhoAtual, '/transferencias')} ? 'ativo'">TRANSFERÊNCIAS</a>
        <a th:href="@{/pagamentos}" th:classappend="${#strings.startsWith(caminhoAtual, '/pagamentos')} ? 'ativo'">PAGAMENTOS</a>
        <a th:href="@{/relatorios/pessoas}" th:classappend="${#strings.startsWith(caminhoAtual, '/relatorios')} ? 'ativo'">RELATÓRIOS</a>
        <a th:href="@{/configuracoes/financeiras}" th:classappend="${#strings.startsWith(caminhoAtual, '/configuracoes')} ? 'ativo'">CONFIGURAÇÕES</a>
        <a th:href="@{/usuarios}" sec:authorize="hasRole('ADMIN')" th:classappend="${#strings.startsWith(caminhoAtual, '/usuarios')} ? 'ativo'">USUÁRIOS</a>
        <form class="menu-sair" th:action="@{/logout}" method="post">
          <button class="btn-menu-sair" type="submit">SAIR</button>
        </form>
      </nav>
    </header>

    <main class="main">
      <section th:replace="~{fragments/messages :: mensagens}"></section>
      <div th:replace="${conteudo}"></div>
    </main>
  </div>

  <script th:src="@{/js/app.js}"></script>
</div>
</body>
</html>
