<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${titulo} + ' | ' + ${nomeAplicacao}">Economizze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:fragment="pagina(titulo,conteudo)">
  <div class="layout">
    <header class="topbar">
      <div class="topbar-grid">
        <h1 th:text="${nomeAplicacao}">Economizze</h1>
        <small th:if="${usuarioLogado != null}">
          USUARIO: <span th:text="${usuarioLogado.nomeCompleto}"></span>
          | PERFIL: <span th:text="${usuarioLogado.perfil}"></span>
        </small>
      </div>
      <nav class="nav-mobile">
        <a th:href="@{/dashboard}" th:classappend="${#httpServletRequest.requestURI == '/dashboard'} ? 'ativo'">INICIO</a>
        <a th:href="@{/lancamentos}" th:classappend="${#httpServletRequest.requestURI.startsWith('/lancamentos')} ? 'ativo'">LANCAMENTOS</a>
        <a th:href="@{/cobrancas}" th:classappend="${#httpServletRequest.requestURI.startsWith('/cobrancas')} ? 'ativo'">COBRANCAS</a>
        <a th:href="@{/pessoas}" th:classappend="${#httpServletRequest.requestURI.startsWith('/pessoas')} ? 'ativo'">PESSOAS</a>
        <a th:href="@{/cartoes}" th:classappend="${#httpServletRequest.requestURI.startsWith('/cartoes')} ? 'ativo'">CARTOES</a>
      </nav>
      <form th:action="@{/logout}" method="post" style="margin-top:0.5rem;">
        <button class="btn btn-secundario" type="submit">SAIR</button>
      </form>
    </header>

    <main class="main">
      <section th:replace="~{fragments/messages :: mensagens}"></section>
      <div th:replace="${conteudo}"></div>
    </main>
  </div>

  <script th:src="@{/js/app.js}"></script>
</div>
</body>
</html>
