<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Formulario de Cartao')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Cartoes', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2 th:text="${acao == 'criar'} ? 'NOVO CARTAO' : 'EDITAR CARTAO'"></h2>
      <form class="grid" th:object="${cartaoForm}" th:action="${acao == 'criar'} ? @{/cartoes} : @{/cartoes/{id}(id=${cartao.id})}" method="post">
        <div class="grid grid-2">
          <div>
            <label for="numeroCartao">NUMERO DO CARTAO *</label>
            <input id="numeroCartao" th:field="*{numeroCartao}" class="cartao-mask" required>
          </div>
          <div>
            <label for="bandeira">BANDEIRA *</label>
            <input id="bandeira" th:field="*{bandeira}" class="uppercase-input" required>
          </div>
        </div>
        <div class="grid grid-3">
          <div>
            <label for="banco">BANCO *</label>
            <input id="banco" th:field="*{banco}" class="uppercase-input" required>
          </div>
          <div>
            <label for="diaFechamento">DIA DE FECHAMENTO *</label>
            <input id="diaFechamento" th:field="*{diaFechamento}" type="number" min="1" max="31" required>
          </div>
          <div>
            <label for="diaVencimento">DIA DE VENCIMENTO *</label>
            <input id="diaVencimento" th:field="*{diaVencimento}" type="number" min="1" max="31" required>
          </div>
        </div>
        <div class="btn-grupo">
          <button class="btn btn-primario" type="submit">SALVAR</button>
          <a class="btn btn-secundario" th:href="@{/cartoes}">VOLTAR</a>
        </div>
      </form>
    </section>
  </div>
</div>
</body>
</html>
