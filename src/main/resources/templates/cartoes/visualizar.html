<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Visualizar Cartao')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Cartoes', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <h2>DETALHES DO CARTAO</h2>
      <div class="grid grid-2">
        <div><label>NUMERO</label><div th:text="${@formatador.maskCartao(cartao.numeroCartao)}"></div></div>
        <div><label>BANDEIRA</label><div th:text="${cartao.bandeira}"></div></div>
        <div><label>BANCO</label><div th:text="${cartao.banco}"></div></div>
        <div><label>FECHAMENTO</label><div th:text="${cartao.diaFechamento}"></div></div>
        <div><label>VENCIMENTO</label><div th:text="${cartao.diaVencimento}"></div></div>
        <div><label>STATUS</label><div th:text="${cartao.ativo} ? 'ATIVO' : 'INATIVO'"></div></div>
      </div>
      <div class="btn-grupo" style="margin-top:1rem;">
        <a class="btn btn-sucesso" th:href="@{/cartoes/{id}/editar(id=${cartao.id})}" sec:authorize="hasRole('ADMIN')">EDITAR</a>
        <a class="btn btn-secundario" th:href="@{/cartoes}">VOLTAR</a>
      </div>
    </section>
  </div>
</div>
</body>
</html>
