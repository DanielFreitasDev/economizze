<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Cartoes')}"></head>
<body>
<div th:replace="~{fragments/base :: pagina('Cartoes', ~{::conteudo})}">
  <div th:fragment="conteudo">
    <section class="card">
      <div class="btn-grupo" style="justify-content:space-between;align-items:center;">
        <h2>CARTOES</h2>
        <a class="btn btn-primario" th:href="@{/cartoes/novo}" sec:authorize="hasRole('ADMIN')">NOVO CARTAO</a>
      </div>
      <div class="tabela-wrapper">
        <table class="tabela">
          <thead><tr><th>NUMERO</th><th>BANDEIRA</th><th>BANCO</th><th>FECHAMENTO</th><th>VENCIMENTO</th><th>STATUS</th><th>ACOES</th></tr></thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(cartoes)}"><td colspan="7">Nenhum cartao cadastrado.</td></tr>
          <tr th:each="item : ${cartoes}">
            <td th:text="${@formatador.maskCartao(item.numeroCartao)}"></td>
            <td th:text="${item.bandeira}"></td>
            <td th:text="${item.banco}"></td>
            <td th:text="${item.diaFechamento}"></td>
            <td th:text="${item.diaVencimento}"></td>
            <td><span class="tag" th:classappend="${!item.ativo} ? 'tag-inativo'" th:text="${item.ativo} ? 'ATIVO' : 'INATIVO'"></span></td>
            <td>
              <div class="btn-grupo">
                <a class="btn btn-secundario" th:href="@{/cartoes/{id}(id=${item.id})}">VER</a>
                <a class="btn btn-sucesso" th:href="@{/cartoes/{id}/editar(id=${item.id})}" sec:authorize="hasRole('ADMIN')">EDITAR</a>
                <form th:action="@{/cartoes/{id}/desativar(id=${item.id})}" method="post" th:if="${item.ativo}" sec:authorize="hasRole('ADMIN')">
                  <button class="btn btn-alerta" type="submit">DESATIVAR</button>
                </form>
                <form th:action="@{/cartoes/{id}/excluir(id=${item.id})}" method="post" sec:authorize="hasRole('ADMIN')">
                  <button class="btn btn-danger" type="submit">EXCLUIR</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
</body>
</html>
